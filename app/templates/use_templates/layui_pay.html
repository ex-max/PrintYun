<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <title>Pay</title>


    <link rel="stylesheet" type="text/css" href="https://cdn.staticfile.net/layui/2.9.21/css/layui.min.css"/>
    <script type="text/javascript" src="https://cdn.staticfile.net/jquery/1.9.1/jquery.min.js"></script>

</head>

<body style="margin-left:5%; padding:1%;">
<br>

<div style="width: 90%">
    <fieldset class="layui-elem-field layui-field-title" style="margin-top: 50px;">
        <legend>и®ўеҚ•иҜҰжғ…</legend>
    </fieldset>

    <table class="layui-table" lay-skin="line">
        <colgroup>
            <col width="150">
            <col width="150">

        </colgroup>
        <thead>

        <tr>
            <th>и®ўеҚ•еҸ?/th>
            <th>{{ data["tradeid"] }}</th>
            <input id="tradeid" value="{{ data["tradeid"] }}" type="hidden">
        </tr>

        </thead>
        <tbody>

        <tr>
            <td>з”ЁжҲ·иҙҰеҸ·</td>
            <td>{{ data["user_tel"] }}</td>
        </tr>

        <tr>
            <td>ж–Үд»¶еҗҚз§°</td>
            <td>{{ data["printfile"] }}</td>
        </tr>

        <tr>
            <td>и®ўеҚ•ж—¶й—ҙ</td>
            <td>{{ data['now'] }}</td>
        </tr>

        <tr>
            <td>еә”д»ҳйҮ‘йўқ</td>
            <td><b>{{ data["cost"] }}</b></td>
        </tr>

        <tr>
            <td>жү“еҚ°д»Ҫж•°</td>
            <td><b>{{ data["print_copies"] }}</b></td>
        </tr>

        <tr>
            <td>жү“еҚ°зӮ?/td>
            <td><b>{{ data["print_place"] }}</b></td>
        </tr>

        <td>&nbsp;</td>
        <td align="center">
            <div class="layui-btn-group">
                <div class="site-demo-button" id="layerDemo"
                     style="margin-bottom: 0; width: 216px; margin: 0; white-space:nowrap;">

                    <button id='vx_pay' data-method="wechat" class="layui-btn layui-bg-weixin">еҫ?дҝ?ж”?д»?/button>
                    <button id='al_pay' data-method="alipay" class="layui-btn layui-btn-normal">ж”Ҝд»ҳе®қж”Ҝд»?/button>
                    {% if data['new_filename'][-3:] == "pdf" %}
                        <a class="layui-btn layui-btn-green" href='#'
                           onclick="window.open('../admin/look_pdf/viewer.html?file=../../static/Upload_Files/{{ data['new_filename'] }}','PDF','width:50%;height:50%;top:100;left:100;');">йў„и§Ҳ</a>
                    {% endif %}
                    {% if data['new_filename'][-3:] != "pdf" %}
                        <a class="layui-btn layui-btn-green" target="_blank"
                           href="../admin/look_picture/{{ data['new_filename'] }}">йў„и§Ҳ</a>
                    {% endif %}

                </div>

            </div>
        </td>


        </tbody>
    </table>
</div>

<script type="text/javascript" src="https://cdn.staticfile.net/layui/2.9.21/layui.min.js"></script>
<script>
    layui.use('layer', function () { //зӢ¬з«ӢзүҲзҡ„layerж— йңҖжү§иЎҢиҝҷдёҖеҸ?
        var $ = layui.jquery, layer = layui.layer; //зӢ¬з«ӢзүҲзҡ„layerж— йңҖжү§иЎҢиҝҷдёҖеҸ?

        //и§ҰеҸ‘дәӢд»¶
        var active = {
            setTop: function () {
                var that = this;

            }

            , wechat: function () {
                $(function () {
                    $('#vx_pay').click(function () {
                        $.ajax({
                            url: '/jsons/js_pay',
                            dataType: 'json',
                            type: "post",
                            data: {
                                'name': '{{ data['printfile'] }}',
                                'pay_type': 'native',
                                'order_id': 'vxpay-' + '{{ data["tradeid"] }}',
                                'order_uid': '{{ data["user_tel"] }}',
                                'tradeid': '{{ data["tradeid"] }}'
                            },
                            success: function (data) {
                                layer.open({
                                    type: 1
                                    ,
                                    title: 'еҫ®дҝЎж”Ҝд»ҳ'//дёҚжҳҫзӨәж Үйўҳж Ҹ
                                    ,
                                    closeBtn: 2
                                    ,
                                    area: '350px;'
                                    ,
                                    shade: 0.5
                                    ,
                                    anim: 1
                                    ,
                                    id: 'wechat_pay' //и®ҫе®ҡдёҖдёӘidпјҢйҳІжӯўйҮҚеӨҚеј№еҮ?
                                    ,
                                    btn: ['йҮҚдёӢи®ўеҚ•', 'зЎ®и®Өж”Ҝд»ҳ']
                                    ,
                                    btnAlign: 'c'
                                    ,
                                    moveType: 1 //жӢ–жӢҪжЁЎејҸпј?жҲ–иҖ?
                                    ,
                                    content: "<div style='padding: 50px; line-height: 22px; background-color: #393D49; color: #fff; font-weight: 300;'><img style='width: 90%;height: 90%;' src='../../static/pay_qrcode/" + data.url + ".jpg'></div>"
                                    ,
                                    success: function (layero) {
                                        var btn0 = layero.find('.layui-layer-btn');
                                        btn0.find('.layui-layer-btn0').attr({
                                            href: '/admin/select'
                                            , target: '_blank'
                                        });

                                        var btn1 = layero.find('.layui-layer-btn');
                                        btn1.find('.layui-layer-btn1').click(function () {
                                            $.ajax({
                                                    url: '/jsons/query_status',
                                                    dataType: 'json',
                                                    type: "post",
                                                    data: {
                                                        'aoid': data.aoid
                                                    },
                                                    success: function (quey_statu) {
                                                        if (quey_statu.quey_status == 'success') {
                                                            window.location.href = "/printer/select";
                                                            alert('ж”Ҝд»ҳжҲҗеҠҹ,еҚіе°Ҷи·іиҪ¬еҲ°дёҠдј йЎөйқ?);
                                                        } else {
                                                            alert('ж”Ҝд»ҳеӨұиҙҘ')
                                                        }
                                                    }
                                                }
                                            )}

                                    )
                                    }
                                })
                            }, //еҫ®дҝЎж”Ҝд»ҳеј№зӘ—
                        })
                    })
                })
            },
            // ж”Ҝд»ҳе®қж”Ҝд»ҳеј№зӘ?
            alipay: function () {
                $(function () {
                    $('#al_pay').click(function () {
                        $.ajax({
                            url: '/jsons/js_pay',
                            dataType: 'json',
                            type: "post",
                            data: {
                                'name': '{{ data['printfile'] }}',
                                'pay_type': 'alipay',
                                'order_id': 'alpay-' + '{{ data["tradeid"] }}',
                                'order_uid': '{{ data["user_tel"] }}',
                                'tradeid': '{{ data["tradeid"] }}'
                            },
                            success: function (data) {
                                layer.open({
                                    type: 1
                                    ,
                                    title: 'ж”Ҝд»ҳе®қж”Ҝд»?//дёҚжҳҫзӨәж Үйўҳж Ҹ
                                    ,
                                    closeBtn: 2
                                    ,
                                    area: '350px;'
                                    ,
                                    shade: 0.5
                                    ,
                                    anim: 1
                                    ,
                                    id: 'alipay_pay' //и®ҫе®ҡдёҖдёӘidпјҢйҳІжӯўйҮҚеӨҚеј№еҮ?
                                    ,
                                    btn: ['йҮҚдёӢи®ўеҚ•', 'зЎ®и®Өж”Ҝд»ҳ']
                                    ,
                                    btnAlign: 'c'
                                    ,
                                    moveType: 1 //жӢ–жӢҪжЁЎејҸпј?жҲ–иҖ?
                                    ,
                                    content: "<div style='padding: 50px; line-height: 22px; background-color: #393D49; color: #fff; font-weight: 300;'><img style='width: 90%;height: 90%;' src='../../static/pay_qrcode/" + data.url + ".jpg'></div>"
                                    ,
                                    success: function (layero) {
                                        var btn = layero.find('.layui-layer-btn');
                                        btn.find('.layui-layer-btn0').attr({
                                            href: '/admin/select'
                                            , target: '_blank'
                                        });
                                        var btn1 = layero.find('.layui-layer-btn');
                                        btn1.find('.layui-layer-btn1').click(function () {
                                            $.ajax({
                                                    url: '/jsons/query_status',
                                                    dataType: 'json',
                                                    type: "post",
                                                    data: {
                                                        'aoid': data.aoid
                                                    },
                                                    success: function (quey_statu) {
                                                        if (quey_statu.quey_status == 'success') {
                                                            window.location.href = "/printer/select";
                                                            alert('ж”Ҝд»ҳжҲҗеҠҹ,еҚіе°Ҷи·іиҪ¬еҲ°дёҠдј йЎөйқ?);
                                                        } else {
                                                            alert('ж”Ҝд»ҳеӨұиҙҘ')
                                                        }
                                                    }
                                                }
                                            )}

                                    )
                                    }
                                })
                            }, //еҫ®дҝЎж”Ҝд»ҳеј№зӘ—
                        })
                    })
                });
            }
            //еҫ®дҝЎж”Ҝд»ҳеј№зӘ—


            , offset:

                function (othis) {
                    var type = othis.data('type')
                        , text = othis.text();

                    layer.open({
                        type: 1
                        , offset: type
                        , id: 'layerDemo' + type //йҳІжӯўйҮҚеӨҚеј№еҮә
                        , content: '<div style="padding: 20px 100px;">' + text + '</div>'
                        , btn: 'е…ій—ӯе…ЁйғЁ'
                        , btnAlign: 'c' //жҢүй’®еұ…дёӯ
                        , shade: 0 //дёҚжҳҫзӨәйҒ®зҪ?
                        , yes: function () {
                            layer.closeAll();
                        }
                    });
                }
        };

        $('#layerDemo .layui-btn').on('click', function () {
            var othis = $(this), method = othis.data('method');
            active[method] ? active[method].call(this, othis) : '';
        });

    })
    ;
</script>

</body>
</html>
